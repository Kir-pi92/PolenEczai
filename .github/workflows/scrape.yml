name: Eczane Verisi Guncelle
on:
  schedule:
    # Her 4 saatte bir calisacak sekilde (Cron formati)
    - cron: "0 */4 * * *"
  workflow_dispatch: # Manuel calistirmaya izin verir

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Depoyu cek
      uses: actions/checkout@v4
      
    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Python betigini calistir ve veri cek
      run: python scraper.py
        
    - name: JSON degisikliklerini kontrol et ve kaydet
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        # Eger veri.json degismisse commit at
        if git diff-index --quiet HEAD --; then
          echo "Veri ayni, degisiklik yok."
        else
          git commit -m "🚀 Oto-Guncelleme: Guncel eczane verisi cekildi"
          git push
        fi
